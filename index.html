<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Redirigiendo a CalendGüi</title>
    <script>
      // Link de la última versión (hardcodeado por ahora)
      const latestLink = "https://script.google.com/a/macros/penguin.academy/s/AKfycbwT3CxVGu_foNWfnrpXM3A7EyWWc_csIQLJe2YvBULVod1sLJR8mVnA0S3AvIBWuh0M/exec"; 

      // Construir el link final con ?vista=participante
      const finalLink = latestLink + "?vista=participante";

      // Redirigir automáticamente al cargar la página
      window.location.href = finalLink;
    </script>
  </head>
  <body>
    <p>Redirigiendo a CalendGüi... Si no funciona, haz <a id="fallback" href="#">click aquí</a>.</p>
    <script>
      // Actualizar link de fallback
      document.getElementById('fallback').href = latestLink + "?vista=participante";
    </script>
  </body>
</html>
